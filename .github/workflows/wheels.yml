name: Build and publish Python wheels

on:
    push:
        branches: ["main"]
        tags: ["v*"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    id-token: write # CRITICAL FOR TRUSTED PUBLISHING OIDC TOKENS

jobs:
    build_wheels:
        name: Build wheels on ${{ matrix.os }} (${{ matrix.arch }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux x86_64
                    - os: ubuntu-latest
                      arch: x86_64
                    # macOS Apple Silicon (Native)
                    - os: macos-latest
                      arch: arm64
                    # macOS Intel (Cross-compiled)
                    - os: macos-latest
                      arch: x86_64
                    # WINDOWS x86_64 SUPPORT
                    - os: windows-latest
                      arch: AMD64

        steps:
            - uses: actions/checkout@v4

            - name: Set up QEMU
              if: runner.os == 'Linux' && matrix.arch == 'aarch64'
              uses: docker/setup-qemu-action@v3

            - name: Build wheels via cibuildwheel
              uses: pypa/cibuildwheel@v2.22.0
              env:
                  CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
                  CIBW_ARCHS: ${{ matrix.arch }}

                  # 1. SKIP MUSLLINUX (Alpine) because it doesn't support 'yum'
                  CIBW_SKIP: "*-musllinux*"

                  # 2. FORCE MACOS TARGET
                  MACOSX_DEPLOYMENT_TARGET: "11.0"

                  CIBW_BEFORE_ALL_LINUX: "yum install -y zlib-devel libzstd-devel pcre2-devel"

                  CIBW_ENVIRONMENT: |
                      CMAKE_BUILD_TYPE=Release
                      indicators_FOUND=FALSE
                      nlohmann_json_FOUND=FALSE
                      spdlog_FOUND=FALSE
                      fmt_FOUND=FALSE

                  # 3. QUOTE THE VALUE containing semicolons
                  CIBW_ENVIRONMENT_MACOS: |
                      CMAKE_IGNORE_PREFIX_PATH="/opt/homebrew;/usr/local"

                  CIBW_TEST_COMMAND: |
                      python -c "import fstd; print('Successfully loaded fstd from:', fstd.__file__)"
                      python -c "from fstd import _native; print('Native extension verified at:', _native.__file__)"

            - name: Setup SSH Debug Session on Failure
              if: failure()
              uses: mxschmitt/action-tmate@v3
              with:
                  limit-access-to-actor: false

            - name: Upload Intermediary Wheel Storage
              uses: actions/upload-artifact@v4
              with:
                  name: python-wheels-${{ matrix.os }}-${{ matrix.arch }}
                  path: ./wheelhouse/*.whl
                  retention-days: 1

    publish_pypi:
        name: Publish Python Dist to PyPI
        needs: build_wheels
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - name: Download Built Wheels
              uses: actions/download-artifact@v4
              with:
                  path: ./dist
                  pattern: python-wheels-*
                  merge-multiple: true

            - name: Publish Package to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: ./dist/
                  # To target TestPyPI for testing, uncomment the next line:
                  # repository-url: https://pypi.org
