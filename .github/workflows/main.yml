name: Build and publish release on multiple platforms

on:
    push:
        # branches: ["main"]
        tags: ["v*"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                build_type: [Release]
                c_compiler: [gcc, clang, cl]
                arch: [x86_64, arm64]
                include:
                    - os: ubuntu-latest
                      c_compiler: gcc
                      cpp_compiler: g++
                      arch: x86_64
                    - os: ubuntu-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                      arch: x86_64
                    - os: macos-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                      arch: arm64
                    - os: macos-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                      arch: x86_64
                    # WINDOWS MATRIX DEFINITION:
                    - os: windows-latest
                      c_compiler: cl
                      cpp_compiler: cl
                      arch: x86_64
                exclude:
                    - os: windows-latest
                      c_compiler: gcc
                    - os: windows-latest
                      c_compiler: clang
                    - os: windows-latest
                      arch: arm64
                    - os: ubuntu-latest
                      c_compiler: cl
                    - os: ubuntu-latest
                      arch: arm64
                    - os: macos-latest
                      c_compiler: gcc
                    - os: macos-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v4

            - name: Set build directory
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

            - name: Install Linux dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libzstd-dev libpcre2-dev lcov

            - name: Configure CMake
              shell: bash
              run: |
                  EXTRA_FLAGS=""

                  # IF CROSS-COMPILING x86_64 ON macOS ARM64:
                  if [ "${{ matrix.os }}" = "macos-latest" ] && [ "${{ matrix.arch }}" = "x86_64" ]; then
                    EXTRA_FLAGS="-DCMAKE_FIND_FRAMEWORK=NEVER \
                                 -DCMAKE_FIND_APPBUNDLE=NEVER \
                                 -DCMAKE_IGNORE_PREFIX_PATH=/opt/homebrew \
                                 -Dzstd_RESOLVED=FALSE \
                                 -Dpcre2_RESOLVED=FALSE"
                  fi

                  # CRITICAL CHANGE: Wrapped path definitions inside strict quotes
                  cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
                  -DCMAKE_CXX_COMPILER="${{ matrix.cpp_compiler }}" \
                  -DCMAKE_C_COMPILER="${{ matrix.c_compiler }}" \
                  -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" \
                  -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
                  $EXTRA_FLAGS \
                  -S "${{ github.workspace }}"

            - name: Build Main Binary Targets
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

            - name: Test
              # Only run tests if the compiled architecture matches the host runner environment
              if: (matrix.os == 'macos-latest' && matrix.arch == 'arm64') || (matrix.os != 'macos-latest')
              shell: bash
              working-directory: ${{ steps.strings.outputs.build-output-dir }}
              run: ctest --build-config ${{ matrix.build_type }}

            - name: Setup SSH Debug Session on Failure
              if: failure()
              uses: mxschmitt/action-tmate@v3
              with:
                  limit-access-to-actor: false

            - name: Install and Stage Artifacts
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  # CRITICAL FIX: Wrapped the build output folder variable in strict double quotes
                  cmake --install "${{ steps.strings.outputs.build-output-dir }}" --prefix ./install_stage --config ${{ matrix.build_type }}

            - name: Prepare Package Archive
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  if [ "${{ matrix.os }}" = "windows-latest" ]; then
                    # Pack a native .zip file for Windows distributions
                    ARCHIVE_NAME="fstd-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.c_compiler }}.zip"
                    cd install_stage
                    7z a "../$ARCHIVE_NAME" *
                  else
                    # Pack standard .tar.gz for Linux and macOS distributions
                    ARCHIVE_NAME="fstd-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.c_compiler }}.tar.gz"
                    cd install_stage
                    tar -czf "../$ARCHIVE_NAME" *
                  fi

                  echo "ARCHIVE_PATH=${{ github.workspace }}/$ARCHIVE_NAME" >> "$GITHUB_ENV"
                  echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

            - name: Upload Intermediary Artifacts
              if: startsWith(github.ref, 'refs/tags/v')
              uses: actions/upload-artifact@v4
              with:
                  name: release-package-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.c_compiler }}
                  path: ${{ env.ARCHIVE_PATH }}
                  retention-days: 1

    publish:
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Gather All Packages
              uses: actions/download-artifact@v4
              with:
                  path: ./dist
                  pattern: release-package-*
                  merge-multiple: true

            - name: Generate GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  # Captures both .tar.gz and .zip compression packages seamlessly
                  files: |
                      ./dist/*.tar.gz
                      ./dist/*.zip
                  draft: false
                  prerelease: false
                  generate_release_notes: true
