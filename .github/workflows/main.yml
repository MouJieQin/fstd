name: CMake on multiple platforms

on:
    push:
        branches: ["main"]
        tags: ["v*"] # Triggers the release process when you push a version tag like v1.0.0
    pull_request:
        branches: ["main"]

# Grants the workflow permission to write releases and read contents
permissions:
    contents: write

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                build_type: [Release]
                c_compiler: [gcc, clang]
                include:
                    - os: ubuntu-latest
                      c_compiler: gcc
                      cpp_compiler: g++
                    - os: ubuntu-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                    - os: macos-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                exclude:
                    - os: windows-latest
                      c_compiler: clang
                    - os: ubuntu-latest
                      c_compiler: cl
                    - os: macos-latest
                      c_compiler: gcc
                    - os: macos-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v4

            - name: Set build directory
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

            - name: Install Linux dependencies
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libzstd-dev libpcre2-dev lcov

            - name: Configure CMake
              run: >
                  cmake -B ${{ steps.strings.outputs.build-output-dir }}
                  -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
                  -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
                  -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                  -S ${{ github.workspace }}

            - name: Build
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

            - name: Test
              working-directory: ${{ steps.strings.outputs.build-output-dir }}
              run: ctest --build-config ${{ matrix.build_type }}

            - name: Setup SSH Debug Session on Failure
              if: failure()
              uses: mxschmitt/action-tmate@v3
              with:
                  limit-access-to-actor: false

            # STEP 1: Use CMake to stage the installation outputs to a local "dist" folder
            # This automatically matches your CMAKE_INSTALL_BINDIR, LIBDIR, and INCLUDEDIR structures.
            - name: Install and Stage Artifacts
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  cmake --install ${{ steps.strings.outputs.build-output-dir }} --prefix ./install_stage --config ${{ matrix.build_type }}

            # STEP 2: Compress the staged folder into a clean architecture bundle
            - name: Prepare Package Archive
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  # Define a consistent cross-platform naming convention
                  ARCHIVE_NAME="fstd-${{ matrix.os }}-${{ matrix.c_compiler }}.tar.gz"

                  # Move inside the staging directory and zip up its internal structure (bin, lib, include)
                  cd install_stage
                  tar -czf "../$ARCHIVE_NAME" *

                  echo "ARCHIVE_PATH=${{ github.workspace }}/$ARCHIVE_NAME" >> "$GITHUB_ENV"
                  echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

            # STEP 3: Stash the compressed package in GitHub's upload buffer
            - name: Upload Intermediary Artifacts
              if: startsWith(github.ref, 'refs/tags/v')
              uses: actions/upload-artifact@v4
              with:
                  name: release-package-${{ matrix.os }}-${{ matrix.c_compiler }}
                  path: ${{ env.ARCHIVE_PATH }}
                  retention-days: 1

    publish:
        # This job will only execute if the 'build' matrix passes and a tag was pushed
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # STEP 3: Download all matrix zipped files collected in Step 2
            - name: Gather All Packages
              uses: actions/download-artifact@v4
              with:
                  path: ./dist
                  pattern: release-package-*
                  merge-multiple: true

            # STEP 4: Create a GitHub Release and attach the files
            - name: Generate GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: ./dist/*.tar.gz
                  draft: false
                  prerelease: false
                  generate_release_notes: true # Auto-generates release change logs based on commit messages
